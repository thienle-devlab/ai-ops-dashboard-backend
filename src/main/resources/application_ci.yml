# ── Profile: ci ──────────────────────────────────────────────────────────────
# Dùng khi SPRING_PROFILES_ACTIVE=ci (GitLab CI pipeline)
# Ưu tiên: khởi động nhanh, log gọn, không seed data thừa

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:ai_dashboard_test}
    username: ${POSTGRES_USER:ai_user}
    password: ${POSTGRES_PASSWORD:ai_pass}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 10000

  jpa:
    show-sql: false

  flyway:
    repeatable-sql-migration-prefix: "#"
    locations: classpath:db/migration

# ── Server ───────────────────────────────────────────────────────────────────
server:
  error:
    include-message: always
    include-stacktrace: never

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.aidashboard: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

# ── App ───────────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:ci-test-secret-key-not-production-32c}
    expiration-ms: 3600000
  encryption:
    key: ${ENCRYPTION_KEY:ci-encryption-key-32chars!!}
  webclient:
    connect-timeout-ms: 5000
    read-timeout-ms: 30000
  scheduler:
    metrics-aggregation-cron: "0 0 1 * * *"
    alert-check-cron: "0 0 8 * * *"